services:
  academy-file:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: 12345678
      POSTGRES_USER: postgres
    ports:
      - "5434:5434"
    command: "-p 5434"
  pgadmin:
    image: "dpage/pgadmin4"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.command
      PGADMIN_DEFAULT_PASSWORD: 12345678
    ports:
      - "5051:80"
    depends_on:
      - academy-file
